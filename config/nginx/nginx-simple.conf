user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip Settings
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Client Settings
    client_max_body_size 100M;

    # Docker's embedded DNS — re-resolve the backend on every request instead
    # of once at nginx startup. A static `upstream { server web:8000; }` block
    # resolves the hostname once and caches it forever; if `web` is later
    # rebuilt/recreated (e.g. by a redeploy) it gets a new container IP, and
    # nginx keeps proxying to the old, now-dead address until nginx itself is
    # restarted. Using a resolver + variable-based proxy_pass avoids that.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Include server configurations
    include /etc/nginx/conf.d/*.conf;
}